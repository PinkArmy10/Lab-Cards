<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Card Site</title>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css"
  />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-md navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" href="#">
        <img src="../cookies/cookie.jpg" alt="Cookie logo" style="width:50px;height:50px;border-radius:25px;">
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navMenu"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-5">
          <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">About</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>

        <form class="d-flex ms-auto">
          <input class="form-control me-2" type="search" placeholder="Search" />
          <button class="btn btn-outline-success" type="submit">Search</button>
        </form>
      </div>
    </div>
  </nav>

  <!-- Cards -->
  <main class="container py-4">
    <div class="row row-cols-sm-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 g-3">
      
      <div class="col">
        <div class="card h-100">
          <img src="../cookies/cookie1.jpg" class="card-img-top" alt="Pink Sugar cookie">
          <div class="card-body">
            <h5 class="card-title">Pink Sugar</h5>
            <p class="card-text">Sweet and colorful.</p>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card h-100">
          <img src="../cookies/cookie2.jpg" class="card-img-top" alt="Chocolate chip cookie">
          <div class="card-body">
            <h5 class="card-title">Choc Chip</h5>
            <p class="card-text">A classic favorite.</p>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card h-100">
          <img src="../cookies/cookie3.jpg" class="card-img-top" alt="Kris Kringle cookie">
          <div class="card-body">
            <h5 class="card-title">Kris Kringle</h5>
            <p class="card-text">Holiday-themed fun.</p>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card h-100">
          <img src="../cookies/cookie4.jpg" class="card-img-top" alt="Fruitcake cookie">
          <div class="card-body">
            <h5 class="card-title">Fruitcake</h5>
            <p class="card-text">A festive flavor.</p>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card h-100">
          <img src="../cookies/cookie5.jpg" class="card-img-top" alt="Gingerbread cookie">
          <div class="card-body">
            <h5 class="card-title">Gingerbread</h5>
            <p class="card-text">Spiced and warm.</p>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card h-100">
          <img src="../cookies/cookie6.jpg" class="card-img-top" alt="Carrot cookie">
          <div class="card-body">
            <h5 class="card-title">Carrot</h5>
            <p class="card-text">A softer, lighter treat.</p>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card h-100">
          <img src="../cookies/cookie7.jpg" class="card-img-top" alt="Rum Raisin cookie">
          <div class="card-body">
            <h5 class="card-title">Rum Raisin</h5>
            <p class="card-text">Rich and flavorful.</p>
          </div>
        </div>
      </div>

    </div>
  </main>

</body>
</html>
